name: OpenStopTimer
options:
  bundleIdPrefix: dev.camminady.openstoptimer
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  OpenStopTimerKit:
    path: OpenStopTimerKit

targets:
  OpenStopTimer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OpenStopTimer
        excludes:
          - "Supporting/Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.camminady.openstoptimer
        PRODUCT_NAME: OpenStopTimer
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OpenStopTimer/Supporting/Info.plist
        ENABLE_PREVIEWS: YES
        # Automatic signing with the team ID baked in here (not just picked
        # in Xcode's UI) so it survives `xcodegen generate` regenerating the
        # .xcodeproj from scratch — without this, every regeneration wiped
        # the team selection back out and Xcode demanded it again. No paid
        # Apple Developer account needed for on-device testing.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 728V7UQDA9
    dependencies:
      - package: OpenStopTimerKit

  OpenStopTimerUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OpenStopTimerUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.camminady.openstoptimer.uitests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 728V7UQDA9
    dependencies:
      - target: OpenStopTimer

schemes:
  OpenStopTimer:
    build:
      targets:
        OpenStopTimer: all
        OpenStopTimerUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OpenStopTimerUITests
